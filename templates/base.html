<!DOCTYPE html>
<html class="scroll-smooth" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}Bravvi Tec | Liderando a Inovação que Define o Futuro{% endblock %}</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Ajudando empresas globais a prosperar no futuro que seus produtos estão inventando hoje. Estratégias de alto impacto e engenharia de elite para a era digital." />
    <meta name="keywords" content="Bravvi Tec, Tecnologia, Consultoria de TI, Inteligência Artificial, Engenharia de Software, Cloud, SaaS, Inovação" />
    <meta name="author" content="Bravvi Tec" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo_square.png') }}" />

    <!-- Tailwind CSS via CDN com plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Google Fonts: Hanken Grotesk (títulos) & Inter (corpo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    
    <!-- Google Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- SweetAlert2 (Modais elegantes) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

    <!-- Configuração Customizada do Tailwind CSS baseada na Opção 2 -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#747782",
                        "surface-container-high": "#e6e8eb",
                        "surface-container-low": "#f2f4f7",
                        "surface": "#f7f9fc",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#001848",
                        "on-surface-variant": "#444650",
                        "surface-bright": "#f7f9fc",
                        "on-background": "#191c1e",
                        "secondary-fixed": "#ffdad4",
                        "surface-container": "#eceef1",
                        "on-secondary-container": "#fffbff",
                        "tertiary": "#401600",
                        "primary-fixed-dim": "#b2c5ff",
                        "surface-container-highest": "#e0e3e6",
                        "on-primary-fixed-variant": "#254388",
                        "surface-tint": "#405ca1",
                        "on-primary-container": "#849fea",
                        "secondary-container": "#e41f13",
                        "on-surface": "#191c1e",
                        "surface-variant": "#e0e3e6",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#e48c5d",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed": "#341100",
                        "inverse-on-surface": "#eff1f4",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#410000",
                        "surface-dim": "#d8dadd",
                        "background": "#f7f9fc",
                        "secondary": "#bc0000", // Vermelho Acobreado Accent
                        "tertiary-fixed": "#ffdbcb",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#622600",
                        "on-secondary": "#ffffff",
                        "primary-container": "#123478",
                        "inverse-surface": "#2d3133",
                        "on-secondary-fixed-variant": "#930000",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#dae2ff",
                        "on-tertiary-fixed-variant": "#75340c",
                        "secondary-fixed-dim": "#ffb4a8",
                        "inverse-primary": "#b2c5ff",
                        "primary": "#001f56", // Azul Marinho Principal
                        "outline-variant": "#c4c6d2",
                        "tertiary-fixed-dim": "#ffb692"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-desktop": "64px",
                        "container-max": "1280px",
                        "margin-mobile": "20px",
                        "stack-unit": "8px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Hanken Grotesk"],
                        "label-sm": ["Hanken Grotesk"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "display-lg": ["64px", {"lineHeight": "72px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body-md overflow-x-hidden">

    {% block content %}{% endblock %}

    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
